<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soft Study Kawaii Notebooks</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts: Fredoka & Quicksand -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- React & ReactDOM CDN (Versiones estables) -->
  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel Standalone (Versión fija y estable para evitar errores de importación de módulos) -->
  <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

  <style>
    body {
      font-family: 'Quicksand', sans-serif;
      background-color: #FAF6EE;
      color: #5C4D4D;
    }
    h1, h2, h3, h4, .font-kawaii {
      font-family: 'Fredoka', sans-serif;
    }
    /* Estilo de Scrollbar Kawaii */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #FAF6EE;
    }
    ::-webkit-scrollbar-thumb {
      background: #E6DFD3;
      border-radius: 99px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #D5CDBF;
    }
    /* Animación de giro de hoja */
    .page-turn-right {
      animation: flipRight 0.6s ease-in-out forwards;
      transform-origin: left center;
    }
    .page-turn-left {
      animation: flipLeft 0.6s ease-in-out forwards;
      transform-origin: right center;
    }
    @keyframes flipRight {
      0% { transform: rotateY(0deg); }
      50% { transform: rotateY(-15deg) skewY(1deg); }
      100% { transform: rotateY(0deg); }
    }
    @keyframes flipLeft {
      0% { transform: rotateY(0deg); }
      50% { transform: rotateY(15deg) skewY(-1deg); }
      100% { transform: rotateY(0deg); }
    }
  </style>
</head>
<body class="bg-[#FAF6EE] text-[#5C4D4D] selection:bg-[#B3E5FC]">

  <div id="root"></div>

  <!-- Definición explícita de preajustes de Babel para React en el navegador -->
  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef } = React;

    function App() {
      // --- ESTADOS ---
      const [currentView, setCurrentView] = useState('dashboard'); // 'dashboard' o 'notebook'
      const [selectedSubject, setSelectedSubject] = useState('Lectura Crítica');
      const [currentPageIndex, setCurrentPageIndex] = useState(0);
      const [stickerPanelOpen, setStickerPanelOpen] = useState(false);
      const [stickerTab, setStickerTab] = useState('figures'); // 'figures' | 'ai' | 'upload'
      const [activeTool, setActiveTool] = useState('select'); // 'select' | 'text' | 'highlight' | 'postit'
      const [selectedElementId, setSelectedElementId] = useState(null);
      const [highlightColor, setHighlightColor] = useState('#B3E5FC');
      
      // Calendario
      const [selectedDay, setSelectedDay] = useState(20);
      const [calendarEvents, setCalendarEvents] = useState({
        '2026-06-15': [{ id: 1, text: 'Simulacro de Matemáticas', type: 'exam', color: '#FFD1DC' }],
        '2026-06-20': [
          { id: 2, text: 'Lectura Crítica: Filosofía', type: 'study', color: '#BDE0FE' },
          { id: 3, text: 'Repasar vocabulario de Inglés', type: 'task', color: '#C8E6C9' }
        ],
        '2026-06-25': [{ id: 4, text: 'Examen de Ciencias Sociales', type: 'exam', color: '#FFF9C4' }]
      });
      const [newEventText, setNewEventText] = useState('');
      const [newEventType, setNewEventType] = useState('study');
      const [showEventModal, setShowEventModal] = useState(false);

      // Frases Motivacionales
      const quotes = [
        "¡Lo estás haciendo increíble! Cada paso cuenta para lograr tu meta en el ICFES. 💖",
        "La constancia es la clave del éxito. ¡Tú puedes con todo hoy! ✨",
        "Respira hondo, toma un sorbo de té y sigue brillando. ¡Tu futuro te espera! 🌸",
        "Cree en ti tanto como nosotros creemos en tu potencial. 📚⭐",
        "Los pequeños esfuerzos diarios crean grandes resultados. ¡Sigue así! 🌈"
      ];
      const [quoteIndex, setQuoteIndex] = useState(0);

      // Buscador inteligente
      const [searchQuery, setSearchQuery] = useState('');
      const [searchResults, setSearchResults] = useState([]);
      const [isSearchActive, setIsSearchActive] = useState(false);

      // IA Generadora de Stickers (Simulado de manera interactiva)
      const [aiPrompt, setAiPrompt] = useState('');
      const [isGeneratingSticker, setIsGeneratingSticker] = useState(false);
      const [generatedStickers, setGeneratedStickers] = useState([]);

      // Datos de las hojas y cuadernos
      const [notebooksData, setNotebooksData] = useState({
        'Lectura Crítica': [
          { pageType: 'lines', elements: [
            { id: '1', type: 'text', content: 'Preparación de textos argumentativos para el ICFES', x: 80, y: 100, scale: 1, rotate: 0, fontSize: 18, color: '#5C4D4D' },
            { id: '2', type: 'postit', content: 'Recuerda: Identificar la tesis principal del autor en los primeros párrafos.', x: 120, y: 220, scale: 1, rotate: -2, color: '#FFF9C4' }
          ]},
          { pageType: 'lines', elements: [] }
        ],
        'Inglés': [
          { pageType: 'lines', elements: [
            { id: '1', type: 'text', content: 'Grammar review: Present Perfect vs Simple Past', x: 80, y: 80, scale: 1.1, rotate: 0, fontSize: 16, color: '#5C4D4D' }
          ]}
        ],
        'Ciencias Naturales': [
          { pageType: 'lines', elements: [
            { id: '1', type: 'text', content: 'Leyes de la Termodinámica aplicadas', x: 80, y: 100, scale: 1, rotate: 0, fontSize: 16, color: '#5C4D4D' }
          ]}
        ],
        'Ciencias Sociales': [
          { pageType: 'lines', elements: [
            { id: '1', type: 'text', content: 'Constitución Política de Colombia de 1991', x: 80, y: 100, scale: 1, rotate: 0, fontSize: 16, color: '#5C4D4D' }
          ]}
        ],
        'Matemáticas': [
          { pageType: 'grid', elements: [
            { id: '1', type: 'text', content: 'Estudio de Funciones Exponenciales', x: 80, y: 100, scale: 1.2, rotate: 0, fontSize: 18, color: '#5C4D4D' }
          ]}
        ]
      });

      // Drag, Resize & Rotate
      const [dragStart, setDragStart] = useState(null);
      const [transformingAction, setTransformingAction] = useState(null); 
      const [initialTransformState, setInitialTransformState] = useState(null);
      const notebookRef = useRef(null);

      // Cambiar Frase
      const handleNextQuote = () => {
        setQuoteIndex((prev) => (prev + 1) % quotes.length);
      };

      // Agregar Evento al Calendario
      const handleAddEvent = () => {
        if (!newEventText.trim()) return;
        const dateKey = `2026-06-${selectedDay < 10 ? '0' + selectedDay : selectedDay}`;
        const colors = { study: '#BDE0FE', exam: '#FFD1DC', task: '#C8E6C9', reminder: '#FFF9C4' };
        
        const newEvent = {
          id: Date.now(),
          text: newEventText,
          type: newEventType,
          color: colors[newEventType]
        };

        setCalendarEvents(prev => ({
          ...prev,
          [dateKey]: [...(prev[dateKey] || []), newEvent]
        }));
        setNewEventText('');
        setShowEventModal(false);
      };

      // Búsqueda Inteligente
      const handleSearch = (query) => {
        setSearchQuery(query);
        if (!query.trim()) {
          setSearchResults([]);
          return;
        }
        const results = [];
        Object.keys(notebooksData).forEach(subject => {
          notebooksData[subject].forEach((page, pageIdx) => {
            page.elements.forEach(el => {
              if (
                (el.type === 'text' || el.type === 'postit') &&
                el.content.toLowerCase().includes(query.toLowerCase())
              ) {
                results.push({ subject, pageIdx, textSnippet: el.content, type: el.type });
              }
            });
          });
        });
        setSearchResults(results);
      };

      // Pasar Hoja
      const handleFlipPage = (direction) => {
        const element = document.getElementById('kawaii-notebook-paper');
        if (element) {
          element.classList.remove('page-turn-right', 'page-turn-left');
          void element.offsetWidth; // Forzar reflow
          element.classList.add(direction === 'next' ? 'page-turn-right' : 'page-turn-left');
        }
        
        if (direction === 'next' && currentPageIndex < notebooksData[selectedSubject].length - 1) {
          setCurrentPageIndex(prev => prev + 1);
        } else if (direction === 'prev' && currentPageIndex > 0) {
          setCurrentPageIndex(prev => prev - 1);
        }
      };

      // Añadir Hoja Nueva
      const handleAddPage = () => {
        const isMath = selectedSubject === 'Matemáticas';
        setNotebooksData(prev => ({
          ...prev,
          [selectedSubject]: [
            ...prev[selectedSubject],
            { pageType: isMath ? 'grid' : 'lines', elements: [] }
          ]
        }));
        setCurrentPageIndex(notebooksData[selectedSubject].length);
      };

      // Añadir elementos a la hoja mediante clic directo
      const handlePageClick = (e) => {
        if (activeTool === 'select') return;
        if (!notebookRef.current) return;

        const rect = notebookRef.current.getBoundingClientRect();
        const x = e.clientX - rect.left - 20;
        const y = e.clientY - rect.top - 20;

        let newElement = null;
        const id = 'el_' + Date.now();

        if (activeTool === 'text') {
          newElement = { id, type: 'text', content: 'Nuevo texto...', x, y, scale: 1, rotate: 0, fontSize: 16, color: '#5C4D4D' };
        } else if (activeTool === 'postit') {
          newElement = { id, type: 'postit', content: 'Escribe tu nota...', x, y, scale: 1, rotate: 1, color: '#FFF9C4' };
        } else if (activeTool === 'highlight') {
          newElement = { id, type: 'highlight', x, y, width: 120, height: 18, color: highlightColor, rotate: 0, scale: 1 };
        }

        if (newElement) {
          const updatedPages = [...notebooksData[selectedSubject]];
          updatedPages[currentPageIndex].elements.push(newElement);
          setNotebooksData(prev => ({ ...prev, [selectedSubject]: updatedPages }));
          setSelectedElementId(id);
          setActiveTool('select'); // Regresa al puntero
        }
      };

      // Actualizar texto del elemento
      const handleUpdateElementText = (id, text) => {
        const updatedPages = [...notebooksData[selectedSubject]];
        const el = updatedPages[currentPageIndex].elements.find(e => e.id === id);
        if (el) {
          el.content = text;
          setNotebooksData(prev => ({ ...prev, [selectedSubject]: updatedPages }));
        }
      };

      // Añadir pegatinas / stickers
      const handleAddSticker = (sticker) => {
        const id = 'sticker_' + Date.now();
        const newElement = { id, type: 'sticker', content: sticker, x: 120, y: 120, scale: 1.2, rotate: 0 };
        const updatedPages = [...notebooksData[selectedSubject]];
        updatedPages[currentPageIndex].elements.push(newElement);
        setNotebooksData(prev => ({ ...prev, [selectedSubject]: updatedPages }));
        setSelectedElementId(id);
      };

      // Generar sticker con IA (Mecanismo Simulado Elegante)
      const handleGenerateSticker = () => {
        if (!aiPrompt.trim()) return;
        setIsGeneratingSticker(true);
        setTimeout(() => {
          const cuteEmojis = ['🦊', '🍡', '🍭', '🐾', '🎈', '🎨', '🚀', '🔮'];
          const randomEmoji = cuteEmojis[Math.floor(Math.random() * cuteEmojis.length)];
          setGeneratedStickers(prev => [randomEmoji, ...prev]);
          setIsGeneratingSticker(false);
          setAiPrompt('');
        }, 1200);
      };

      // Controles de drag, escala y rotación
      const handleElementPointerDown = (e, element, action) => {
        e.stopPropagation();
        setSelectedElementId(element.id);
        setTransformingAction(action);
        setDragStart({ x: e.clientX, y: e.clientY });
        setInitialTransformState({
          x: element.x,
          y: element.y,
          scale: element.scale || 1,
          rotate: element.rotate || 0,
          width: element.width || 120,
          height: element.height || 18
        });
      };

      const handlePointerMove = (e) => {
        if (!transformingAction || !selectedElementId || !dragStart) return;

        const deltaX = e.clientX - dragStart.x;
        const deltaY = e.clientY - dragStart.y;
        const updatedPages = [...notebooksData[selectedSubject]];
        const element = updatedPages[currentPageIndex].elements.find(el => el.id === selectedElementId);

        if (!element) return;

        if (transformingAction === 'drag') {
          element.x = initialTransformState.x + deltaX;
          element.y = initialTransformState.y + deltaY;
        } else if (transformingAction === 'resize') {
          if (element.type === 'highlight') {
            element.width = Math.max(20, initialTransformState.width + deltaX);
            element.height = Math.max(8, initialTransformState.height + deltaY);
          } else {
            const factor = 1 + (deltaX / 150);
            element.scale = Math.max(0.4, Math.min(4, initialTransformState.scale * factor));
          }
        } else if (transformingAction === 'rotate') {
          element.rotate = initialTransformState.rotate + (deltaX * 0.8);
        }

        setNotebooksData(prev => ({ ...prev, [selectedSubject]: updatedPages }));
      };

      const handlePointerUp = () => {
        setTransformingAction(null);
        setDragStart(null);
      };

      const handleDeleteElement = (id) => {
        const updatedPages = [...notebooksData[selectedSubject]];
        updatedPages[currentPageIndex].elements = updatedPages[currentPageIndex].elements.filter(el => el.id !== id);
        setNotebooksData(prev => ({ ...prev, [selectedSubject]: updatedPages }));
        setSelectedElementId(null);
      };

      const handleDuplicateElement = (element) => {
        const id = 'dup_' + Date.now();
        const duplicated = { ...element, id, x: element.x + 35, y: element.y + 35 };
        const updatedPages = [...notebooksData[selectedSubject]];
        updatedPages[currentPageIndex].elements.push(duplicated);
        setNotebooksData(prev => ({ ...prev, [selectedSubject]: updatedPages }));
        setSelectedElementId(id);
      };

      const activePage = notebooksData[selectedSubject]?.[currentPageIndex] || { pageType: 'lines', elements: [] };

      return (
        <div 
          className="min-h-screen bg-[#FAF6EE] text-[#5C4D4D] flex flex-col"
          onPointerMove={handlePointerMove}
          onPointerUp={handlePointerUp}
        >
          {/* BARRA DE ENCABEZADO */}
          <header className="px-8 py-4 bg-white/70 backdrop-blur-md border-b border-[#E6DFD3] flex justify-between items-center z-10">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-[#BDE0FE] rounded-full flex items-center justify-center text-xl shadow-inner shadow-white">
                🌸
              </div>
              <div>
                <h1 className="text-xl font-bold tracking-tight text-[#4A3E3D] font-kawaii">
                  Soft Study <span className="text-[#A8DADC]">Kawaii</span> Notebooks
                </h1>
                <p className="text-xs text-[#8A7C72]">Tu espacio favorito para prepararte para el ICFES</p>
              </div>
            </div>

            {/* Selector de Vistas Globales */}
            <div className="flex bg-[#F4EFE6] rounded-full p-1 border border-[#E6DFD3]">
              <button 
                onClick={() => { setCurrentView('dashboard'); setStickerPanelOpen(false); }}
                className={`px-5 py-2 rounded-full text-xs font-semibold transition-all ${currentView === 'dashboard' ? 'bg-[#BDE0FE] text-[#334E68] shadow-sm' : 'hover:bg-white/50 text-[#8A7C72]'}`}
              >
                🏠 Inicio
              </button>
              <button 
                onClick={() => setCurrentView('notebook')}
                className={`px-5 py-2 rounded-full text-xs font-semibold transition-all ${currentView === 'notebook' ? 'bg-[#FFD1DC] text-[#632C3A] shadow-sm' : 'hover:bg-white/50 text-[#8A7C72]'}`}
              >
                📖 Cuaderno: {selectedSubject}
              </button>
            </div>

            <div className="flex items-center gap-3">
              <button className="w-9 h-9 flex items-center justify-center rounded-full bg-[#FAF6EE] hover:bg-[#F3EFE3] border border-[#E6DFD3] text-sm transition-all">🔔</button>
              <button className="w-9 h-9 flex items-center justify-center rounded-full bg-[#FAF6EE] hover:bg-[#F3EFE3] border border-[#E6DFD3] text-sm transition-all">⚙️</button>
              <div className="flex items-center gap-2 pl-2 border-l border-[#E6DFD3]">
                <div className="w-8 h-8 rounded-full bg-[#FFD1DC] border-2 border-[#BDE0FE] flex items-center justify-center text-sm font-bold">🦊</div>
                <span className="text-xs font-bold text-[#5C4D4D] hidden sm:inline">Sofi Study ✨</span>
              </div>
            </div>
          </header>

          {/* CUERPO DE LA APP */}
          <main className="flex-1 flex overflow-hidden">
            
            {/* VISTA 1: DASHBOARD */}
            {currentView === 'dashboard' && (
              <div className="flex-1 overflow-y-auto px-8 py-6 space-y-8 max-w-7xl mx-auto w-full">
                
                {/* Banner de Bienvenida */}
                <div className="bg-gradient-to-r from-[#FFF5F5] via-[#FFF9F2] to-[#EEF5FC] border border-[#E6DFD3]/60 p-8 rounded-[24px] shadow-sm relative overflow-hidden">
                  <div className="absolute right-12 bottom-0 top-0 w-80 pointer-events-none hidden md:flex items-center justify-center">
                    <div className="text-9xl animate-bounce duration-[3000ms] opacity-80">🌸</div>
                  </div>
                  <div className="relative z-10 max-w-2xl">
                    <span className="bg-[#BDE0FE]/50 text-[#334E68] text-[10px] font-bold tracking-widest uppercase px-3 py-1 rounded-full border border-[#BDE0FE]">
                      Camino al ICFES 🚀
                    </span>
                    <h2 className="text-3xl font-extrabold text-[#4A3E3D] mt-3 mb-2 font-kawaii leading-tight">
                      Organiza tus materias de forma estética y divertida
                    </h2>
                    <p className="text-sm text-[#8A7C72] mb-6 leading-relaxed">
                      Utiliza nuestro cuaderno inteligente para organizar tus esquemas, añadir notas adhesivas y preparar cada área clave de evaluación con tranquilidad.
                    </p>
                    <div className="flex gap-3">
                      <button 
                        onClick={() => { setSelectedSubject('Lectura Crítica'); setCurrentView('notebook'); }}
                        className="bg-[#BDE0FE] hover:bg-[#A8C9E8] active:scale-95 text-[#2C3E50] text-xs font-bold px-5 py-3 rounded-2xl shadow-sm border border-white/40 transition-all"
                      >
                        📝 Abrir Lectura Crítica
                      </button>
                    </div>
                  </div>
                </div>

                {/* Grid de Materias */}
                <div>
                  <h3 className="text-lg font-bold text-[#4A3E3D] font-kawaii mb-4">Mis Materias</h3>
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-5">
                    {[
                      { name: 'Lectura Crítica', icon: '📖', progress: 72, notes: 2, color: 'bg-[#FFD1DC]/40 border-[#FFD1DC]', textCol: 'text-[#8A3A4E]' },
                      { name: 'Inglés', icon: '🇺🇸', progress: 45, notes: 1, color: 'bg-[#BDE0FE]/40 border-[#BDE0FE]', textCol: 'text-[#2D4F7C]' },
                      { name: 'Ciencias Naturales', icon: '🧪', progress: 60, notes: 1, color: 'bg-[#C8E6C9]/40 border-[#C8E6C9]', textCol: 'text-[#3E6B44]' },
                      { name: 'Ciencias Sociales', icon: '🌎', progress: 30, notes: 1, color: 'bg-[#FFF9C4]/40 border-[#FFF9C4]', textCol: 'text-[#7D6B19]' },
                      { name: 'Matemáticas', icon: '➗', progress: 85, notes: 1, color: 'bg-[#E1BEE7]/40 border-[#E1BEE7]', textCol: 'text-[#6C3483]' }
                    ].map((subj) => (
                      <div 
                        key={subj.name}
                        onClick={() => { setSelectedSubject(subj.name); setCurrentPageIndex(0); setCurrentView('notebook'); }}
                        className={`p-5 rounded-[24px] border-2 ${subj.color} flex flex-col justify-between cursor-pointer hover:-translate-y-1 hover:shadow-md active:scale-95 transition-all duration-300 bg-white/60`}
                      >
                        <div>
                          <div className="w-12 h-12 rounded-2xl bg-white flex items-center justify-center text-2xl shadow-sm mb-4">
                            {subj.icon}
                          </div>
                          <h4 className="font-bold text-sm text-[#4A3E3D] mb-1 font-kawaii">{subj.name}</h4>
                          <p className="text-[11px] text-[#8A7C72] mb-4">{subj.notes} páginas</p>
                        </div>
                        <div>
                          <div className="flex justify-between items-center text-[10px] mb-1 font-semibold text-[#8A7C72]">
                            <span>Progreso</span>
                            <span className={subj.textCol}>{subj.progress}%</span>
                          </div>
                          <div className="w-full bg-[#E6DFD3] h-2 rounded-full overflow-hidden">
                            <div className="h-full rounded-full bg-current" style={{ width: `${subj.progress}%`, color: subj.textCol }}></div>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Calendario y Post-Its */}
                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
                  
                  {/* Calendario */}
                  <div className="lg:col-span-7 bg-white border border-[#E6DFD3] rounded-[24px] p-6 shadow-sm">
                    <div className="flex justify-between items-center mb-4">
                      <div>
                        <h3 className="font-bold text-base text-[#4A3E3D] font-kawaii flex items-center gap-2">📅 Calendario de Exámenes</h3>
                        <p className="text-xs text-[#8A7C72]">Establece tus prioridades para el ICFES</p>
                      </div>
                      <button onClick={() => setShowEventModal(true)} className="text-xs font-bold px-3 py-1.5 bg-[#BDE0FE] hover:bg-[#99C5F1] text-[#334E68] rounded-xl transition-all">
                        + Añadir Evento
                      </button>
                    </div>

                    <div className="grid grid-cols-7 gap-2 text-center text-xs font-bold text-[#8A7C72] mb-2 border-b border-[#FAF6EE] pb-2">
                      <span>D</span><span>L</span><span>M</span><span>M</span><span>J</span><span>V</span><span>S</span>
                    </div>
                    <div className="grid grid-cols-7 gap-2">
                      {/* Offset Junio 2026 */}
                      <div className="h-10"></div>
                      {[...Array(30)].map((_, idx) => {
                        const dayNum = idx + 1;
                        const dateKey = `2026-06-${dayNum < 10 ? '0' + dayNum : dayNum}`;
                        const dayEvents = calendarEvents[dateKey] || [];
                        const isSelected = selectedDay === dayNum;

                        return (
                          <div 
                            key={dayNum}
                            onClick={() => setSelectedDay(dayNum)}
                            className={`h-11 rounded-xl flex flex-col items-center justify-between p-1 cursor-pointer transition-all ${
                              isSelected ? 'bg-[#BDE0FE] text-[#334E68] shadow-sm' : 'hover:bg-[#FAF6EE] text-[#5C4D4D]'
                            }`}
                          >
                            <span className="text-[11px] font-bold">{dayNum}</span>
                            <div className="flex gap-0.5 justify-center w-full">
                              {dayEvents.map((ev, eIdx) => (
                                <div key={eIdx} className="w-1.5 h-1.5 rounded-full" style={{ backgroundColor: ev.color }}></div>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    {/* Mostrar tareas diarias */}
                    <div className="mt-4 pt-4 border-t border-[#FAF6EE]">
                      <h4 className="text-xs font-bold text-[#4A3E3D] mb-2">Eventos para el día {selectedDay} de Junio:</h4>
                      {(calendarEvents[`2026-06-${selectedDay < 10 ? '0' + selectedDay : selectedDay}`] || []).length === 0 ? (
                        <p className="text-xs text-[#8A7C72] italic">Sin pendientes para hoy. ¡Buen trabajo! 🌸</p>
                      ) : (
                        <div className="space-y-2">
                          {(calendarEvents[`2026-06-${selectedDay < 10 ? '0' + selectedDay : selectedDay}`] || []).map((ev) => (
                            <div key={ev.id} className="flex items-center gap-2 p-2 rounded-xl text-xs font-semibold border bg-white shadow-sm" style={{ borderColor: ev.color }}>
                              <span className="text-sm">📌</span>
                              <span className="text-[#4A3E3D]">{ev.text}</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Post-it Motivacional */}
                  <div className="lg:col-span-5 flex flex-col justify-between">
                    <div className="bg-[#FFF9C4]/80 border border-[#F1E085] rounded-[24px] p-6 shadow-md transform rotate-1 min-h-[220px] flex flex-col justify-between relative overflow-hidden">
                      <div>
                        <span className="text-lg">🧸</span>
                        <h3 className="font-kawaii text-sm font-bold text-[#7D6B19] tracking-wider mb-2">CONSEJO MOTIVACIONAL</h3>
                        <p className="text-sm font-medium text-[#6B5A10] italic leading-relaxed font-kawaii">
                          "{quotes[quoteIndex]}"
                        </p>
                      </div>
                      <div className="flex justify-between items-center mt-6">
                        <span className="text-[10px] text-[#7D6B19] font-kawaii">Kawaii Team 💖</span>
                        <button 
                          onClick={handleNextQuote}
                          className="bg-white hover:bg-[#FAF6EE] text-[#7D6B19] font-bold text-[11px] px-3 py-1.5 rounded-full border border-[#F1E085] active:scale-95 transition-all"
                        >
                          Siguiente frase ✨
                        </button>
                      </div>
                    </div>
                  </div>

                </div>
              </div>
            )}

            {/* VISTA 2: CUADERNO DIGITAL */}
            {currentView === 'notebook' && (
              <div className="flex-1 flex overflow-hidden">
                
                {/* BARRA LATERAL IZQUIERDA FIJA (20%) */}
                <aside className="w-[20%] min-w-[200px] border-r border-[#E6DFD3] bg-white p-4 flex flex-col justify-between select-none">
                  <div className="space-y-6">
                    
                    <div>
                      <span className="text-[10px] font-bold tracking-wider text-[#A8C9E8] uppercase block mb-2 px-2">Navegación</span>
                      <div className="space-y-1">
                        <button onClick={() => setCurrentView('dashboard')} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-bold text-[#8A7C72] hover:bg-[#FAF6EE] transition-all">
                          <span>🏠</span> Inicio
                        </button>
                        <button onClick={() => setCurrentView('notebook')} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-bold bg-[#BDE0FE]/30 text-[#334E68] transition-all">
                          <span>📚</span> Mis Cuadernos
                        </button>
                        <button onClick={() => setIsSearchActive(!isSearchActive)} className="w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-xs font-bold text-[#8A7C72] hover:bg-[#FAF6EE] transition-all">
                          <span className="flex items-center gap-3">🔍 Búsqueda</span>
                          {isSearchActive && <span className="text-[9px] bg-[#FFD1DC] text-[#632C3A] px-1.5 py-0.5 rounded-full">on</span>}
                        </button>
                      </div>
                    </div>

                    <div>
                      <span className="text-[10px] font-bold tracking-wider text-[#A8C9E8] uppercase block mb-2 px-2">Herramientas</span>
                      <div className="space-y-1">
                        {[
                          { id: 'select', name: 'Mover Elementos', icon: '🖐️' },
                          { id: 'text', name: 'Añadir Texto', icon: '✏️' },
                          { id: 'highlight', name: 'Resaltador Pastel', icon: '🖍' },
                          { id: 'postit', name: 'Nota Adhesiva', icon: '📌' }
                        ].map(tool => (
                          <button 
                            key={tool.id}
                            onClick={() => setActiveTool(tool.id)}
                            className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-xs font-bold transition-all ${
                              activeTool === tool.id ? 'bg-[#FFD1DC] text-[#632C3A] shadow-sm' : 'text-[#8A7C72] hover:bg-[#FAF6EE]'
                            }`}
                          >
                            <span>{tool.icon}</span> {tool.name}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <span className="text-[10px] font-bold tracking-wider text-[#A8C9E8] uppercase block mb-2 px-2">Creativo</span>
                      <button onClick={() => setStickerPanelOpen(!stickerPanelOpen)} className={`w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-xs font-bold transition-all ${stickerPanelOpen ? 'bg-[#C8E6C9] text-[#244629]' : 'text-[#8A7C72] hover:bg-[#FAF6EE]'}`}>
                        <span className="flex items-center gap-3">✨ Stickers</span>
                        <span>🌸</span>
                      </button>
                    </div>

                  </div>

                  <div className="bg-[#FAF6EE] border border-[#E6DFD3] rounded-2xl p-3 text-[10px]">
                    <div className="font-bold">Materia: <span className="text-[#4A3E3D]">{selectedSubject}</span></div>
                    <div className="font-bold">Total Páginas: <span>{notebooksData[selectedSubject]?.length}</span></div>
                  </div>
                </aside>

                {/* LIENZO DEL CUADERNO (80%) */}
                <div className="flex-1 flex flex-col relative bg-[#F4EFE6] p-6 overflow-hidden">
                  
                  {/* Buscador inteligente */}
                  {isSearchActive && (
                    <div className="absolute top-4 left-4 w-80 bg-white border border-[#E6DFD3] rounded-[24px] p-4 shadow-lg z-20 space-y-4">
                      <div className="flex justify-between items-center">
                        <h4 className="font-bold text-xs text-[#4A3E3D] font-kawaii">Búsqueda Inteligente</h4>
                        <button onClick={() => { setIsSearchActive(false); setSearchQuery(''); }} className="text-xs">✕</button>
                      </div>
                      <input 
                        type="text" 
                        value={searchQuery}
                        onChange={(e) => handleSearch(e.target.value)}
                        placeholder="Busca términos en tus cuadernos..."
                        className="w-full text-xs p-2.5 bg-[#FAF6EE] border border-[#E6DFD3] rounded-xl outline-none"
                      />
                      <div className="max-h-60 overflow-y-auto space-y-2">
                        {searchResults.length === 0 ? (
                          <p className="text-[10px] text-center italic text-[#8A7C72] py-4">Sin coincidencias.</p>
                        ) : (
                          searchResults.map((res, i) => (
                            <div 
                              key={i}
                              onClick={() => { setSelectedSubject(res.subject); setCurrentPageIndex(res.pageIdx); }}
                              className="p-2 hover:bg-[#FAF6EE] border border-dashed border-[#E6DFD3] rounded-xl cursor-pointer"
                            >
                              <div className="flex justify-between text-[9px] font-bold text-[#A8C9E8]">
                                <span>{res.subject}</span>
                                <span>Pág. {res.pageIdx + 1}</span>
                              </div>
                              <p className="text-[11px] truncate mt-1">"{res.textSnippet}"</p>
                            </div>
                          ))
                        )}
                      </div>
                    </div>
                  )}

                  {/* Cabecera del Cuaderno */}
                  <div className="flex justify-between items-center mb-4 z-10">
                    <div className="flex items-center gap-2">
                      <span className="text-xs font-bold text-[#8A7C72]">Visualizando página:</span>
                      <div className="flex bg-white rounded-full px-3 py-1 border border-[#E6DFD3] text-xs font-bold">
                        {currentPageIndex + 1} / {notebooksData[selectedSubject]?.length}
                      </div>
                    </div>
                    <div className="flex items-center gap-2">
                      <button disabled={currentPageIndex === 0} onClick={() => handleFlipPage('prev')} className="px-3 py-1.5 bg-white hover:bg-[#FAF6EE] border border-[#E6DFD3] disabled:opacity-50 text-xs font-bold rounded-xl">◀ Anterior</button>
                      <button onClick={handleAddPage} className="px-3 py-1.5 bg-[#BDE0FE] hover:bg-[#99C5F1] text-[#334E68] text-xs font-bold rounded-xl">+ Añadir Hoja</button>
                      <button disabled={currentPageIndex === notebooksData[selectedSubject]?.length - 1} onClick={() => handleFlipPage('next')} className="px-3 py-1.5 bg-white hover:bg-[#FAF6EE] border border-[#E6DFD3] disabled:opacity-50 text-xs font-bold rounded-xl">Siguiente ▶</button>
                    </div>
                  </div>

                  {/* LIENZO REALISTA (CUADERNO FÍSICO) */}
                  <div 
                    ref={notebookRef}
                    onClick={handlePageClick}
                    id="kawaii-notebook-paper"
                    className={`flex-1 bg-white border border-[#DCD6C8] rounded-[24px] shadow-lg relative p-8 select-none overflow-hidden ${
                      activePage.pageType === 'grid' 
                        ? 'bg-[linear-gradient(to_right,#E8E2D2_1px,transparent_1px),linear-gradient(to_bottom,#E8E2D2_1px,transparent_1px)] bg-[size:24px_24px]'
                        : 'bg-[linear-gradient(#FAF6EE_95%,#EAE3D2_95%)] bg-[size:100%_28px] leading-[28px]'
                    }`}
                    style={{ cursor: activeTool === 'select' ? 'default' : 'crosshair' }}
                  >
                    {/* Espiral izquierdo simulado */}
                    <div className="absolute top-0 bottom-0 left-4 w-4 bg-gradient-to-r from-gray-200 via-gray-400 to-transparent flex flex-col justify-around py-4 z-10 opacity-30">
                      {[...Array(14)].map((_, i) => (
                        <div key={i} className="w-6 h-2 bg-gray-400 rounded-full -ml-1 border-b border-gray-600"></div>
                      ))}
                    </div>

                    {/* Esquina interactiva para pasar de página */}
                    <div 
                      onClick={() => handleFlipPage('next')}
                      className="absolute bottom-0 right-0 w-12 h-12 bg-gradient-to-tl from-gray-200/50 to-white/10 hover:from-[#BDE0FE]/50 cursor-pointer rounded-tl-3xl shadow-md z-10 flex items-end justify-end p-1.5 text-xs text-[#8A7C72]"
                    >
                      📖
                    </div>

                    {/* Render de Elementos Activos */}
                    {activePage.elements.map((el) => {
                      const isSelected = selectedElementId === el.id;

                      return (
                        <div
                          key={el.id}
                          style={{
                            position: 'absolute',
                            left: el.x,
                            top: el.y,
                            transform: `scale(${el.scale || 1}) rotate(${el.rotate || 0}deg)`,
                            transformOrigin: 'top left',
                            zIndex: isSelected ? 20 : 10,
                          }}
                          onPointerDown={(e) => handleElementPointerDown(e, el, 'drag')}
                          className={`group ${isSelected ? 'outline-2 outline-dashed outline-[#A8DADC] p-2' : 'p-2'}`}
                        >
                          {isSelected && (
                            <div className="absolute -top-10 left-0 bg-white border border-[#E6DFD3] rounded-lg px-2 py-1 flex items-center gap-1.5 shadow-md z-30">
                              <button onClick={(e) => { e.stopPropagation(); handleDuplicateElement(el); }} className="text-[10px] hover:bg-[#FAF6EE] p-1 rounded font-bold">➕</button>
                              <button onPointerDown={(e) => handleElementPointerDown(e, el, 'resize')} className="text-[10px] hover:bg-[#FAF6EE] p-1 rounded font-bold cursor-se-resize">📐</button>
                              <button onPointerDown={(e) => handleElementPointerDown(e, el, 'rotate')} className="text-[10px] hover:bg-[#FAF6EE] p-1 rounded font-bold cursor-alias">🔄</button>
                              <button onClick={(e) => { e.stopPropagation(); handleDeleteElement(el.id); }} className="text-[10px] text-red-500 hover:bg-[#FAF6EE] p-1 rounded font-bold">🗑️</button>
                            </div>
                          )}

                          {el.type === 'text' && (
                            <input
                              type="text"
                              value={el.content}
                              onChange={(e) => handleUpdateElementText(el.id, e.target.value)}
                              className="bg-transparent border-b border-transparent focus:border-gray-300 outline-none font-bold font-kawaii"
                              style={{ fontSize: el.fontSize || 16, color: el.color || '#5C4D4D' }}
                            />
                          )}

                          {el.type === 'postit' && (
                            <div className="w-44 p-4 shadow-md rounded-2xl transform text-xs text-[#5C4D4D] font-bold flex flex-col justify-between" style={{ backgroundColor: el.color }}>
                              <textarea
                                value={el.content}
                                onChange={(e) => handleUpdateElementText(el.id, e.target.value)}
                                className="bg-transparent border-none outline-none resize-none w-full h-20 text-xs font-kawaii"
                              />
                            </div>
                          )}

                          {el.type === 'highlight' && (
                            <div className="rounded-full opacity-60" style={{ width: el.width || 120, height: el.height || 18, backgroundColor: el.color || '#FFF9C4' }}></div>
                          )}

                          {el.type === 'sticker' && (
                            <span className="text-5xl pointer-events-none select-none">{el.content}</span>
                          )}
                        </div>
                      );
                    })}

                    {activePage.elements.length === 0 && (
                      <div className="absolute inset-0 flex flex-col items-center justify-center opacity-40 pointer-events-none">
                        <span className="text-6xl mb-2">🌸</span>
                        <p className="text-sm font-bold text-[#8A7C72]">Lienzo en blanco</p>
                        <p className="text-xs text-[#8A7C72]">¡Elige una herramienta y haz clic para escribir!</p>
                      </div>
                    )}
                  </div>

                  <div className="mt-4 flex justify-between items-center bg-white/50 px-4 py-2 rounded-2xl border border-[#E6DFD3]/40">
                    <span className="text-[11px] text-[#8A7C72]">Pro-tip: Presiona una herramienta en el menú izquierdo y pulsa en la hoja para agregar elementos.</span>
                    <span className="text-[11px] font-bold text-[#A8DADC]">PREMIUM WORKSPACE 1.0</span>
                  </div>
                </div>

                {/* BARRA LATERAL DERECHA (STICKERS / CANVA STYLE) */}
                {stickerPanelOpen && (
                  <aside className="w-[28%] min-w-[280px] bg-white border-l border-[#E6DFD3] p-4 flex flex-col justify-between z-10 shadow-lg">
                    <div className="space-y-4">
                      <div className="flex justify-between items-center">
                        <div>
                          <h3 className="font-bold text-sm text-[#4A3E3D] font-kawaii">Pegatinas Kawaii</h3>
                          <p className="text-[10px] text-[#8A7C72]">Dale vida y color a tus notas</p>
                        </div>
                        <button onClick={() => setStickerPanelOpen(false)} className="text-xs font-bold w-6 h-6 flex items-center justify-center bg-[#FAF6EE] hover:bg-[#FFD1DC] rounded-full">✕</button>
                      </div>

                      <div className="grid grid-cols-3 gap-1 bg-[#FAF6EE] p-1 rounded-xl border border-[#E6DFD3]">
                        {['figures', 'ai', 'upload'].map(tab => (
                          <button key={tab} onClick={() => setStickerTab(tab)} className={`text-[10px] font-bold py-1.5 rounded-lg transition-all ${stickerTab === tab ? 'bg-[#BDE0FE] text-[#334E68] shadow-sm' : 'text-[#8A7C72]'}`}>
                            {tab === 'figures' ? 'Pegatinas' : tab === 'ai' ? 'IA Mágica' : 'Subir'}
                          </button>
                        ))}
                      </div>

                      {stickerTab === 'figures' && (
                        <div className="grid grid-cols-4 gap-2">
                          {['🧸', '🌸', '☕', '🐰', '🦄', '🌈', '🍓', '🧁', '🍕', '🐱', '💡', '🔥'].map((emoji) => (
                            <button 
                              key={emoji}
                              onClick={() => handleAddSticker(emoji)}
                              className="p-3 bg-[#FAF6EE] hover:bg-[#FFD1DC]/30 hover:scale-105 active:scale-95 text-xl rounded-2xl border border-[#E6DFD3] transition-all flex items-center justify-center"
                            >
                              {emoji}
                            </button>
                          ))}
                        </div>
                      )}

                      {stickerTab === 'ai' && (
                        <div className="space-y-4">
                          <textarea 
                            value={aiPrompt}
                            onChange={(e) => setAiPrompt(e.target.value)}
                            placeholder='Pídele un sticker kawaii a la IA...'
                            className="w-full text-xs p-3 bg-[#FAF6EE] border border-[#E6DFD3] rounded-2xl outline-none resize-none h-20"
                          />
                          <button 
                            onClick={handleGenerateSticker}
                            disabled={isGeneratingSticker}
                            className="w-full bg-[#BDE0FE] hover:bg-[#99C5F1] text-[#334E68] text-xs font-bold py-2.5 rounded-2xl transition-all"
                          >
                            {isGeneratingSticker ? 'Generando...' : '🪄 Crear Sticker Mágico'}
                          </button>

                          <div className="grid grid-cols-3 gap-2">
                            {generatedStickers.map((st, i) => (
                              <button key={i} onClick={() => handleAddSticker(st)} className="text-4xl p-2 bg-[#FAF6EE] rounded-xl hover:bg-white border">
                                {st}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}

                      {stickerTab === 'upload' && (
                        <div className="border-2 border-dashed border-[#E6DFD3] rounded-2xl p-6 text-center">
                          <span className="text-3xl block mb-2">📁</span>
                          <span className="text-xs font-bold block">Subir desde dispositivo</span>
                        </div>
                      )}
                    </div>
                  </aside>
                )}

              </div>
            )}

          </main>

          {/* MODAL DE EVENTOS */}
          {showEventModal && (
            <div className="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50">
              <div className="bg-white border border-[#E6DFD3] p-6 rounded-3xl max-w-sm w-full space-y-4 shadow-xl">
                <h4 className="font-bold text-sm text-[#4A3E3D] font-kawaii">Crear Evento: Día {selectedDay}</h4>
                <input 
                  type="text"
                  value={newEventText}
                  onChange={(e) => setNewEventText(e.target.value)}
                  placeholder="Ej: Simulacro ICFES Inglés"
                  className="w-full text-xs p-2.5 bg-[#FAF6EE] border border-[#E6DFD3] rounded-xl outline-none"
                />
                <div className="flex gap-2 justify-end">
                  <button onClick={() => setShowEventModal(false)} className="px-4 py-2 bg-[#FAF6EE] text-xs font-bold rounded-xl">Cancelar</button>
                  <button onClick={handleAddEvent} className="px-4 py-2 bg-[#BDE0FE] text-xs font-bold rounded-xl text-[#334E68]">Guardar</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Renderizar la aplicación en el contenedor root
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
