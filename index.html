        /* CSS GENERAL */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #050010; /* Color muy oscuro de fondo */
            color: #d1b3ff; /* Color de texto suave y púrpura */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Evita que la galaxia se mueva si hay scroll */
        }

        /* CONTENEDOR DE LA IMAGEN DE FONDO (GALAXIA + CORAZÓN) */
        .full-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* REEMPLAZA ESTO: Debes tener la imagen en la misma carpeta o usar un enlace directo */
            /* Por ahora, usaremos una descripción para que el código funcione visualmente */
            background: 
                url('image_3.png') no-repeat center center fixed, 
                #050010; /* Fondo de seguridad si no carga */
            background-size: cover;
            filter: blur(0px) contrast(1.1); /* Ligero desenfoque si quieres que el texto resalte más, o 0px para que esté nítida */
            opacity: 0.8; /* Hace que el fondo no sea tan abrumador */
            z-index: -1;
        }

        /* CONTENEDOR PRINCIPAL DEL CONTENIDO */
        .content-hub {
            text-align: center;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            background: rgba(10, 0, 30, 0.8); /* Fondo oscuro semi-transparente para el panel */
            border-radius: 20px;
            border: 2px solid rgba(209, 179, 255, 0.2); /* Borde púrpura muy sutil */
            box-shadow: 0 10px 40px rgba(128, 0, 128, 0.4); /* Sombra púrpura */
            position: relative;
            z-index: 10; /* Encima de la galaxia */
        }
